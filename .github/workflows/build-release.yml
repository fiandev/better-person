name: Build and Release APK

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build APK and Create Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Check Flutter version
        run: flutter --version

      - name: Generate Android platform files
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms android .
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build universal APK
        run: flutter build apk --release

      - name: Build split APKs per ABI
        run: flutter build apk --split-per-abi --release

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: Release v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          body: |
            Automated release from push to master branch.

            **Build date:** ${{ steps.version.outputs.date }}
            **Commit:** ${{ github.sha }}

            ### APK Downloads
            - **Universal APK** - Compatible with all Android devices
            - **arm64-v8a** - For 64-bit ARM devices (most modern phones)
            - **armeabi-v7a** - For 32-bit ARM devices
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
